coverage:
  precision: 2
  round: down
  range: "70...100"

  status:
    project:
      default:
        target: 80%
        threshold: 0.5%
        informational: true
        if_ci_failed: error

    patch:
      default:
        target: 70%
        threshold: 0.5%
        informational: true
        if_ci_failed: error

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true
  hide_project_coverage: false

ignore:
  - "**/*_test.go"
  - "**/testdata"

github_checks:
  annotations: true
